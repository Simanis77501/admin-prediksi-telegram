<!-- groups.html – Manajemen Group Telegram -->
<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="mb-0"><i class="bi bi-people-fill me-2"></i>Manajemen Group</h4>
  <div class="d-flex gap-2">
    <button class="btn btn-sm btn-outline-info" onclick="loadGroups()">
      <i class="bi bi-arrow-clockwise me-1"></i>Refresh
    </button>
    <button class="btn btn-sm btn-warning" data-bs-toggle="modal" data-bs-target="#modalAddGroup">
      <i class="bi bi-plus-circle me-1"></i>Tambah Group
    </button>
  </div>
</div>

<div class="card bg-dark border-0 shadow">
  <div class="card-body">
    <div class="table-responsive">
      <table class="table table-dark table-hover" id="tableGroups">
        <thead>
          <tr>
            <th>#</th>
            <th>Nama Group</th>
            <th>Chat ID</th>
            <th>Pasaran</th>
            <th>Status</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="bodyGroups">
          <tr>
            <td colspan="6" class="text-center text-muted py-4">
              <span class="spinner-border spinner-border-sm me-2"></span> Memuat data...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal Tambah Group -->
<div class="modal fade" id="modalAddGroup" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content bg-dark text-light border-secondary">
      <div class="modal-header border-secondary">
        <h5 class="modal-title"><i class="bi bi-plus-circle me-2"></i>Tambah Group</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Nama Group</label>
          <input type="text" class="form-control bg-secondary text-light border-0" id="inputGroupName" placeholder="Contoh: Group VIP HK" />
        </div>
        <div class="mb-3">
          <label class="form-label">Chat ID</label>
          <input type="text" class="form-control bg-secondary text-light border-0" id="inputChatId" placeholder="Contoh: -100123456789" />
        </div>
        <div class="mb-3">
          <label class="form-label">Pasaran</label>
          <input type="text" class="form-control bg-secondary text-light border-0" id="inputGroupPasaran" placeholder="Contoh: HK,SGP (pisah koma)" />
          <div class="form-text text-muted">Pisahkan dengan koma untuk multi-pasaran</div>
        </div>
        <div class="mb-3">
          <label class="form-label">Status</label>
          <select class="form-select bg-secondary text-light border-0" id="inputGroupStatus">
            <option value="ACTIVE">ACTIVE</option>
            <option value="INACTIVE">INACTIVE</option>
          </select>
        </div>
      </div>
      <div class="modal-footer border-secondary">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
        <button type="button" class="btn btn-warning" onclick="saveGroup()">
          <i class="bi bi-save me-1"></i>Simpan
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Konfirmasi Hapus -->
<div class="modal fade" id="modalDeleteGroup" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content bg-dark text-light border-danger">
      <div class="modal-header border-danger">
        <h5 class="modal-title text-danger"><i class="bi bi-exclamation-triangle me-2"></i>Konfirmasi Hapus</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p>Apakah Anda yakin ingin menghapus group <strong id="deleteGroupName"></strong>?</p>
      </div>
      <div class="modal-footer border-secondary">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
        <button type="button" class="btn btn-danger" id="btnConfirmDeleteGroup">
          <i class="bi bi-trash me-1"></i>Hapus
        </button>
      </div>
    </div>
  </div>
</div>
