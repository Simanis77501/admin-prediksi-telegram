<!-- dashboard.html – Konten Dashboard -->
<div class="row g-3 mb-4">
  <!-- Stat Cards -->
  <div class="col-12 col-sm-6 col-xl-3">
    <div class="stat-card card bg-dark border-0 shadow h-100">
      <div class="card-body d-flex align-items-center gap-3">
        <div class="stat-icon bg-primary bg-opacity-20 text-primary rounded-3 p-3">
          <i class="bi bi-people-fill fs-3"></i>
        </div>
        <div>
          <p class="text-muted small mb-0">Total Group</p>
          <h3 class="fw-bold mb-0" id="statTotalGroup">–</h3>
        </div>
      </div>
    </div>
  </div>
  <div class="col-12 col-sm-6 col-xl-3">
    <div class="stat-card card bg-dark border-0 shadow h-100">
      <div class="card-body d-flex align-items-center gap-3">
        <div class="stat-icon bg-success bg-opacity-20 text-success rounded-3 p-3">
          <i class="bi bi-chat-dots-fill fs-3"></i>
        </div>
        <div>
          <p class="text-muted small mb-0">Request Hari Ini</p>
          <h3 class="fw-bold mb-0" id="statTotalRequest">–</h3>
        </div>
      </div>
    </div>
  </div>
  <div class="col-12 col-sm-6 col-xl-3">
    <div class="stat-card card bg-dark border-0 shadow h-100">
      <div class="card-body d-flex align-items-center gap-3">
        <div class="stat-icon bg-warning bg-opacity-20 text-warning rounded-3 p-3">
          <i class="bi bi-list-stars fs-3"></i>
        </div>
        <div>
          <p class="text-muted small mb-0">Pasaran Aktif</p>
          <h3 class="fw-bold mb-0" id="statPasaranAktif">–</h3>
        </div>
      </div>
    </div>
  </div>
  <div class="col-12 col-sm-6 col-xl-3">
    <div class="stat-card card bg-dark border-0 shadow h-100">
      <div class="card-body d-flex align-items-center gap-3">
        <div class="stat-icon bg-info bg-opacity-20 text-info rounded-3 p-3">
          <i class="bi bi-clock-fill fs-3"></i>
        </div>
        <div>
          <p class="text-muted small mb-0">Jadwal Hari Ini</p>
          <h3 class="fw-bold mb-0" id="statJadwal">–</h3>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="row g-3 mb-4">
  <!-- Chart -->
  <div class="col-12 col-lg-8">
    <div class="card bg-dark border-0 shadow">
      <div class="card-body">
        <h6 class="card-title text-muted mb-3">
          <i class="bi bi-bar-chart-fill me-2 text-warning"></i>Statistik Request
        </h6>
        <div id="chartRequest"></div>
      </div>
    </div>
  </div>

  <!-- Jadwal Posting -->
  <div class="col-12 col-lg-4">
    <div class="card bg-dark border-0 shadow h-100">
      <div class="card-body">
        <h6 class="card-title text-muted mb-3">
          <i class="bi bi-calendar-check me-2 text-success"></i>Jadwal Posting
        </h6>
        <ul class="list-group list-group-flush" id="listJadwal">
          <li class="list-group-item bg-transparent text-muted border-secondary text-center py-3">
            <span class="spinner-border spinner-border-sm me-2"></span> Memuat...
          </li>
        </ul>
      </div>
    </div>
  </div>
</div>

<!-- Recent Requests Table -->
<div class="card bg-dark border-0 shadow">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h6 class="card-title text-muted mb-0">
        <i class="bi bi-clock-history me-2 text-info"></i>5 Request Terbaru
      </h6>
      <button class="btn btn-sm btn-outline-info" onclick="loadDashboardStats()">
        <i class="bi bi-arrow-clockwise me-1"></i>Refresh
      </button>
    </div>
    <div class="table-responsive">
      <table class="table table-dark table-hover table-sm mb-0" id="tableRecentRequests">
        <thead>
          <tr>
            <th>Waktu</th>
            <th>User</th>
            <th>Group</th>
            <th>Request</th>
          </tr>
        </thead>
        <tbody id="bodyRecentRequests">
          <tr>
            <td colspan="4" class="text-center text-muted py-3">
              <span class="spinner-border spinner-border-sm me-2"></span> Memuat data...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
